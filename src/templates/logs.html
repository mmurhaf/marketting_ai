<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Logs - Marketing Agent</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; margin: 0; background: #eaeff5; display: flex; height: 100vh; color: #334e68; }
        .sidebar { width: 250px; background: #fff; border-right: 1px solid #dae1e7; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.02); z-index: 10; }
        .sidebar h2 { color: #102a43; margin-top: 0; font-weight: 700; letter-spacing: -0.5px; }
        .nav-link { 
            display: block; padding: 12px 15px; margin-bottom: 5px; 
            text-decoration: none; color: #486581; border-radius: 6px; 
            transition: all 0.2s ease; font-weight: 500;
        }
        .nav-link:hover { background: #f0f4f8; color: #102a43; transform: translateX(3px); }
        .nav-link.active { background: linear-gradient(135deg, #007bff, #0056b3); color: white; box-shadow: 0 4px 6px rgba(0, 123, 255, 0.2); }
        
        .main { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; background-image: radial-gradient(#dceefb 1px, transparent 1px); background-size: 20px 20px; }
        .card { 
            background: #102a43; color: #f0f4f8; padding: 0; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex: 1; display: flex; flex-direction: column; overflow: hidden;
            border-top: 5px solid #007bff;
        }
        
        h1 { 
            margin-top: 0; font-size: 2.2rem; margin-bottom: 25px; letter-spacing: -0.5px;
            background: linear-gradient(120deg, #007bff, #6610f2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .log-container {
            background: #102a43;
            color: #dceefb;
            padding: 20px;
            border-radius: 5px;
            font-family: 'Consolas', 'Monaco', monospace;
            white-space: pre-wrap;
            overflow-y: auto;
            flex: 1;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .refresh-btn {
            padding: 12px 24px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer;
            font-weight: 600; box-shadow: 0 4px 6px rgba(0,123,255,0.2); transition: all 0.2s;
        }
        .refresh-btn:hover { background: #0056b3; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,123,255,0.3); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Marketing AI</h2>
        <a href="/" class="nav-link">Dashboard</a>
        <a href="/editor" class="nav-link">Editor</a>
        <a href="/gallery" class="nav-link">Gallery</a>
        <a href="/settings" class="nav-link">Settings</a>
        <a href="/logs" class="nav-link active">Server Logs</a>
        <a href="/about" class="nav-link">About / Docs</a>
        <a href="/help" class="nav-link">Setup Guide</a>
    </div>
    
    <div class="main">
        <h1>Server Logs</h1>
        
        <div class="card">
            <div class="log-container" id="logContainer">{{ log_content }}</div>
        </div>
        <div style="margin-top: 20px; text-align: right;">
            <button onclick="location.reload()" class="refresh-btn">Refresh Logs</button>
        </div>
    </div>
    <script>
        // Auto scroll to bottom
        const logContainer = document.getElementById('logContainer');
        logContainer.scrollTop = logContainer.scrollHeight;
    </script>
</body>
</html>
